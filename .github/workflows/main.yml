name: Deploy Multi App to GKE

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Images
        run: |
          docker build -t absjrdev/multi-client ./client
          docker build -t absjrdev/multi-server ./server
          docker build -t absjrdev/multi-worker ./worker

      - name: Push Images
        run: |
          docker push absjrdev/multi-client
          docker push absjrdev/multi-server
          docker push absjrdev/multi-worker

      - name: Auth Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Setup Gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Connect GKE
        run: |
          gcloud container clusters get-credentials ${{ secrets.GKE_CLUSTER }} \
           --region ${{ secrets.GKE_REGION }} \
           --project ${{ secrets.GCP_PROJECT_ID }}

      - name: Deploy Kubernetes
        run: |
          kubectl apply -f k8s/
          kubectl rollout restart deployment client-deployment
          kubectl rollout restart deployment server-deployment
          kubectl rollout restart deployment worker-deployment