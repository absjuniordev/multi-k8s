name: Deploy Multi-Container App
on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Login no Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Build de cada componente
      - name: Build & Push Client
        run: |
          docker build -t absjrdev/multi-client ./client
          docker push absjrdev/multi-client

      - name: Build & Push Server
        run: |
          docker build -t absjrdev/multi-server ./server
          docker push absjrdev/multi-server

      - name: Build & Push Worker
        run: |
          docker build -t absjrdev/multi-worker ./worker
          docker push absjrdev/multi-worker

      # Deploy no Kubernetes
      - name: Set Kubernetes Context
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBE_CONFIG }}

      - name: Deploy Manifests
        run: |
          kubectl apply -f k8s/

