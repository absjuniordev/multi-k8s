name: CI/CD Muilt serviços

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Baixa o código do repositório
      - name: Checkout código
        uses: actions/checkout@v4

      # Build da imagem de testes
      - name: Build imagem de teste
        run: docker build -t absjrdev/react-test -f ./client/Dockerfile.dev ./client

      # Roda os testes
      - name: Rodar testes
        run: docker run absjrdev/react-test npm test -- --coverage

      # Build das imagens finais
      - name: Build imagens finais
        run: |
          docker build -t absjrdev/multi-client ./client
          docker build -t absjrdev/multi-nginx ./nginx
          docker build -t absjrdev/multi-server ./server
          docker build -t absjrdev/multi-worker ./worker

      # Login no Docker Hub usando secrets
      - name: Login no Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # Push das imagens para o Docker Hub
      - name: Push das imagens
        run: |
          docker push absjrdev/multi-client
          docker push absjrdev/multi-nginx
          docker push absjrdev/multi-server
          docker push absjrdev/multi-worker
