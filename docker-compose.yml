services:
  postgres:
    image: postgres:15
    environment:
      - POSTGRES_PASSWORD=postgres_password

  redis:
    image: redis:7

  client:
    image: "absjrdev/multi-client"
    mem_limit: 128m
    hostname: client

  server:
    image: "absjrdev/multi-server"
    mem_limit: 128m
    hostname: api
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PGUSER=postgres
      - PGHOST=postgres
      - PGDATABASE=postgres
      - PGPASSWORD=postgres_password
      - PGPORT=5432

  worker:
    image: "absjrdev/multi-worker"
    mem_limit: 128m
    hostname: worker
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379

  nginx:
    image: "absjrdev/multi-nginx"
    mem_limit: 128m
    hostname: nginx
    ports:
      - "80:80"